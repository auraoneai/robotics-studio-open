<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AuraOne · Robotics Studio · Open</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="stylesheet" href="robotics/robotics.css"/>

<style>
  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    min-height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--ro-paper);
  }

  #root {
    width: 100%;
    height: 100%;
    min-height: 0;
    overflow: hidden;
  }

  @media (max-width: 1020px) {
    html,
    body,
    #root {
      height: auto;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
  }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="oklch(0.22 0.04 195)"/>
    <text x="50" y="62" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="38" font-weight="600" fill="oklch(0.74 0.14 185)">RS</text>
  </svg>
</template>

<script src="vendor/react/react.development.js"></script>
<script src="vendor/react-dom/react-dom.development.js"></script>
<script src="vendor/babel/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="robotics/data.jsx"></script>
<script type="text/babel" src="robotics/icons.jsx"></script>
<script type="text/babel" src="robotics/shell.jsx"></script>
<script type="text/babel" src="robotics/screens/_stubs.jsx"></script>
<script type="text/babel" src="robotics/screens/browse.jsx"></script>
<script type="text/babel" src="robotics/screens/scrub.jsx"></script>
<script type="text/babel" src="robotics/screens/failures.jsx"></script>
<script type="text/babel" src="robotics/screens/compare.jsx"></script>
<script type="text/babel" src="robotics/screens/probe.jsx"></script>
<script type="text/babel" src="robotics/screens/sensorqa.jsx"></script>
<script type="text/babel" src="robotics/screens/export.jsx"></script>
<script type="text/babel" src="robotics/screens/settings.jsx"></script>

<script type="text/babel">
const RO_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "amber",
  "density": "compact"
}/*EDITMODE-END*/;

const ACCENTS = {
  teal:   { a: 'oklch(0.55 0.13 195)', a2: 'oklch(0.62 0.13 185)', soft: 'oklch(0.95 0.04 195)', line: 'oklch(0.84 0.07 195)', ink: 'oklch(0.32 0.1 195)' },
  violet: { a: 'oklch(0.5 0.18 285)',  a2: 'oklch(0.6 0.16 285)',  soft: 'oklch(0.95 0.04 285)', line: 'oklch(0.84 0.08 285)', ink: 'oklch(0.34 0.14 285)' },
  amber:  { a: 'oklch(0.62 0.16 60)',  a2: 'oklch(0.7 0.15 60)',   soft: 'oklch(0.96 0.05 60)',  line: 'oklch(0.86 0.1 60)',   ink: 'oklch(0.4 0.13 60)'  },
  rose:   { a: 'oklch(0.58 0.18 15)',  a2: 'oklch(0.66 0.17 15)',  soft: 'oklch(0.95 0.04 15)',  line: 'oklch(0.86 0.1 15)',   ink: 'oklch(0.4 0.15 15)'  },
};

function CommandPalette({ query, setQuery, commands, onRun, onClose }) {
  const Icon = window.ROIcon;
  const inputRef = React.useRef(null);
  const [active, setActive] = React.useState(0);
  const q = query.trim().toLowerCase();
  const results = commands.filter(c => `${c.label} ${c.group} ${c.keywords || ''}`.toLowerCase().includes(q));

  React.useEffect(() => {
    inputRef.current?.focus();
  }, []);

  React.useEffect(() => {
    setActive(0);
  }, [query]);

  function onKeyDown(event) {
    if (event.key === 'Escape') {
      event.preventDefault();
      onClose();
    } else if (event.key === 'ArrowDown') {
      event.preventDefault();
      setActive(i => Math.min(i + 1, Math.max(results.length - 1, 0)));
    } else if (event.key === 'ArrowUp') {
      event.preventDefault();
      setActive(i => Math.max(i - 1, 0));
    } else if (event.key === 'Enter' && results[active]) {
      event.preventDefault();
      onRun(results[active]);
    }
  }

  return (
    <div className="ro-command-backdrop" onMouseDown={onClose}>
      <section className="ro-command-panel" role="dialog" aria-modal="true" aria-label="Command palette" onMouseDown={e => e.stopPropagation()}>
        <div className="ro-command-search">
          <Icon name="search" size={15}/>
          <input
            ref={inputRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={onKeyDown}
            placeholder="Search commands, tabs, exports..."
            aria-label="Search commands"
          />
          <span className="ro-kbd">esc</span>
        </div>
        <div className="ro-command-results" role="listbox" aria-label="Available commands">
          {results.length ? results.map((command, i) => (
            <button
              key={command.id}
              className={`ro-command-item ${i === active ? 'is-active' : ''}`}
              type="button"
              role="option"
              aria-selected={i === active}
              onMouseEnter={() => setActive(i)}
              onClick={() => onRun(command)}
            >
              <span className="ro-command-item-main">
                <strong>{command.label}</strong>
                <small>{command.group}</small>
              </span>
              <span className="ro-command-item-meta">
                {command.shortcut ? <span className="ro-kbd">{command.shortcut}</span> : null}
                <Icon name="arrow-right" size={12}/>
              </span>
            </button>
          )) : (
            <div className="ro-command-empty">
              <span className="ro-display-it">No command found.</span>
              <span>Try a tab name, export, theme, or dataset action.</span>
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

function App() {
  const [t, setT] = window.useTweaks(RO_TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState('browse');
  const [commandOpen, setCommandOpen] = React.useState(false);
  const [commandQuery, setCommandQuery] = React.useState('');

  React.useEffect(() => {
    const r = document.documentElement;
    r.dataset.roTheme = t.theme;
    const ac = ACCENTS[t.accent] || ACCENTS.teal;
    r.style.setProperty('--ro-accent', ac.a);
    r.style.setProperty('--ro-accent-2', ac.a2);
    r.style.setProperty('--ro-accent-soft', ac.soft);
    r.style.setProperty('--ro-accent-line', ac.line);
    r.style.setProperty('--ro-accent-ink', ac.ink);
  }, [t.theme, t.accent]);

  React.useEffect(() => {
    function onKeyDown(event) {
      const key = event.key.toLowerCase();
      if ((event.metaKey || event.ctrlKey) && key === 'k') {
        event.preventDefault();
        setCommandOpen(open => !open);
      }
    }
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  const SCREENS = {
    browse:   window.BrowseScreen,
    scrub:    window.ScrubScreen,
    failures: window.FailuresScreen,
    compare:  window.CompareScreen,
    probe:    window.ProbeScreen,
    sensorqa: window.SensorQAScreen,
    export:   window.ExportScreen,
    settings: window.SettingsScreen,
  };
  const Screen = SCREENS[tab] || window.BrowseScreen;

  const commands = React.useMemo(() => {
    const tabCommands = window.RO_TABS.map(surface => ({
      id: `tab-${surface.id}`,
      label: `Go to ${surface.label}`,
      group: 'Surfaces',
      shortcut: surface.id === tab ? 'current' : '',
      keywords: `${surface.id} screen view`,
      run: () => setTab(surface.id),
    }));

    return [
      ...tabCommands,
      { id: 'open-dataset', label: 'Open dataset', group: 'Dataset', shortcut: '⌘O', keywords: 'load import lerobot rlds hdf5', run: () => setTab('browse') },
      { id: 'review-failures', label: 'Review failure clusters', group: 'Failure taxonomy', shortcut: 'F', keywords: 'cluster taxonomy failures', run: () => setTab('failures') },
      { id: 'run-vla-probe', label: 'Run VLA probe', group: 'Model QA', shortcut: 'P', keywords: 'probe policy vla model', run: () => setTab('probe') },
      { id: 'sensor-qa', label: 'Open sensor QA checks', group: 'Quality', shortcut: 'Q', keywords: 'sensor dropped frames calibration continuity', run: () => setTab('sensorqa') },
      { id: 'export-local', label: 'Export reviewed subset', group: 'Export', shortcut: '⌘E', keywords: 'manifest local download', run: () => setTab('export') },
      { id: 'send-auraone', label: 'Send to AuraOne Programs', group: 'Export', shortcut: '⇧⌘A', keywords: 'intake programs privacy preview', run: () => setTab('export') },
      { id: 'toggle-theme', label: `Switch to ${t.theme === 'dark' ? 'light' : 'dark'} mode`, group: 'View', shortcut: 'T', keywords: 'theme mode light dark', run: () => setT('theme', t.theme === 'dark' ? 'light' : 'dark') },
      { id: 'settings', label: 'Open platform settings', group: 'Platform', shortcut: ',', keywords: 'hooks telemetry signing key', run: () => setTab('settings') },
    ];
  }, [tab, t.theme]);

  function runCommand(command) {
    command.run();
    setCommandQuery('');
    setCommandOpen(false);
  }

  // Right rail visibility — hide on full-width surfaces
  const fullWidth = tab === 'export' || tab === 'settings';

  const { TweaksPanel, TweakSection, TweakRadio, TweakColor } = window;

  return (
    <>
      <div className="ro studio-shell" data-screen-label={`Robotics Studio · ${tab}`}>
        <window.LeftRail/>
        <div className="ro-main-frame">
          <window.TopBar tab={tab} onTab={setTab} theme={t.theme} onTheme={v => setT('theme', v)} onCommand={() => setCommandOpen(true)}/>
          <window.TabBar tab={tab} onTab={setTab}/>
          <div className="workbench ro-workbench">
            <main className="ro-workbench-main">
              <Screen onTab={setTab}/>
            </main>
            {!fullWidth && <window.RightRail/>}
          </div>
          <window.StatusBar tab={tab}/>
        </div>
      </div>

      {commandOpen ? (
        <CommandPalette
          query={commandQuery}
          setQuery={setCommandQuery}
          commands={commands}
          onRun={runCommand}
          onClose={() => {
            setCommandOpen(false);
            setCommandQuery('');
          }}
        />
      ) : null}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakRadio label="Mode" value={t.theme}
            options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
            onChange={v => setT('theme', v)}/>
        </TweakSection>
        <TweakSection label="Accent">
          <div style={{ display: 'flex', gap: 8, padding: '4px 0 2px' }}>
            {Object.entries(ACCENTS).map(([k, ac]) => {
              const on = t.accent === k;
              return (
                <button key={k} type="button" onClick={() => setT('accent', k)}
                  title={k}
                  style={{
                    width: 30, height: 30, borderRadius: 999,
                    background: ac.a, cursor: 'pointer', padding: 0,
                    border: on ? '2px solid #fff' : '2px solid transparent',
                    boxShadow: on ? '0 0 0 2px ' + ac.a : 'none',
                  }}/>
              );
            })}
          </div>
          <div style={{ marginTop: 6, fontSize: 11, color: 'rgba(255,255,255,0.5)', textTransform: 'capitalize' }}>{t.accent}</div>
        </TweakSection>
        <TweakSection label="Surface">
          <TweakRadio label="Density" value={t.density}
            options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Comfortable' }]}
            onChange={v => setT('density', v)}/>
        </TweakSection>
        <TweakSection label="Jump to surface">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, padding: '2px 0' }}>
            {window.RO_TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding: '8px 10px', borderRadius: 6,
                background: tab === t.id ? '#ffffff18' : '#ffffff08',
                border: '1px solid #ffffff10',
                color: '#fff', textAlign: 'left', cursor: 'pointer', fontSize: 11.5,
              }}>{t.label}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
