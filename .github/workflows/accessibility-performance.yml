name: Accessibility and Browser Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    name: Accessibility and Browser Quality / qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
      - uses: pnpm/action-setup@v4
        with:
          version: "10.18.0"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install browser runtime
        run: pnpm exec playwright install --with-deps chromium
      - name: Product and accessibility tests
        run: pnpm test
      - name: Responsive browser tests
        run: pnpm test:browser
